name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Generate static SPA
        run: npm run generate

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/flat-wave-d403"
          status="$(curl --silent --show-error \
            --output /tmp/cloudflare-pages-project.json \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_url}")"

          if [[ "${status}" == "404" ]]; then
            curl --silent --show-error --fail-with-body \
              --output /dev/null \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"name":"flat-wave-d403","production_branch":"main"}' \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          elif [[ "${status}" != "200" ]]; then
            echo "Cloudflare project lookup failed with HTTP ${status}"
            exit 1
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .output/public --project-name=flat-wave-d403 --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
